spring:
  datasource:
    url: jdbc:h2:mem:weddingdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    drop-first: true
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false
server:
  port: 8080
  servlet:
    session:
      timeout: 30m  # Session timeout after 30 minutes of inactivity
      cookie:
        http-only: true  # Prevents XSS attacks by making cookie inaccessible to JavaScript
        secure: false  # Set to true in production with HTTPS
        same-site: strict  # CSRF protection - cookie only sent to same site
        name: MOMENTS_SESSION  # Custom session cookie name
logging:
  level:
    org.springframework: INFO
    com.momentsmanager: DEBUG
    liquibase: INFO
whatsapp:
  api:
    url: "https://graph.facebook.com/v24.0/YOUR_PHONE_NUMBER_ID/messages"
    token: "YOUR_ACCESS_TOKEN"
  webhook:
    verify-token: "moments-manager-verify-token"  # Change this to a random string in production
    app-secret: ""  # Set to your app secret from Meta for webhook signature validation
    endpoint-path: "/api/whatsapp/webhook"  # The endpoint where Meta will send webhook events

