<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Reports - WedKnots</title>
    <meta charset="UTF-8">
    <th:block th:replace="~{_bootstrap_head :: head}"></th:block>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/admin/dashboard">WedKnots – Your Smart Wedding Concierge</a>
  </div>
</nav>
<div class="container py-4">
  <h2 class="mb-4">Admin Reports</h2>

  <div class="row mb-4">
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Total Weddings</h5>
          <p class="display-6" th:text="${summary.weddingsCount}">0</p>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Total Guests</h5>
          <p class="display-6" th:text="${summary.guestsCount}">0</p>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Total Attendees</h5>
          <p class="display-6" th:text="${summary.attendeesCount}">0</p>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Generated At</h5>
          <p class="text-muted" th:text="${#temporals.format(summary.generatedAt, 'yyyy-MM-dd HH:mm')}">-</p>
        </div>
      </div>
    </div>
  </div>

  <h3 class="mt-4">Per Event Summary</h3>

  <!-- Filters -->
  <form class="row mb-3" method="get" action="" th:object="${page}">
    <div class="col-md-3">
      <label class="form-label">Page Size</label>
      <select class="form-select" name="size" th:value="${size}">
        <option th:value="10" th:selected="${size==10}">10</option>
        <option th:value="25" th:selected="${size==25}">25</option>
        <option th:value="50" th:selected="${size==50}">50</option>
        <option th:value="100" th:selected="${size==100}">100</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Search (event name)</label>
      <input type="text" class="form-control" name="search" th:value="${search}" placeholder="Type to filter...">
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button type="submit" class="btn btn-primary">Apply</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th>Event</th>
          <th>Date</th>
          <th>Guests</th>
          <th>Attendees</th>
          <th>Traffic (views)</th>
          <th>Last Updated</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="event : ${events}">
          <td th:text="${event.name}"></td>
          <td th:text="${event.date}"></td>
          <td th:text="${summary.guestsPerEvent[event.id]}">0</td>
          <td th:text="${summary.attendeesPerEvent[event.id]}">0</td>
          <td th:text="${summary.trafficViews[event.id] != null ? summary.trafficViews[event.id] : 0}">0</td>
          <td th:text="${summary.lastUpdated[event.id] != null ? #temporals.format(summary.lastUpdated[event.id], 'yyyy-MM-dd HH:mm') : '-'}">-</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <nav th:if="${page != null}">
    <ul class="pagination">
      <li class="page-item" th:classappend="${page.first} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/reports(page=${page.number-1},size=${size},search=${search})}">Previous</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" th:classappend="${i==page.number} ? 'active'">
        <a class="page-link" th:text="${i+1}" th:href="@{/admin/reports(page=${i},size=${size},search=${search})}"></a>
      </li>
      <li class="page-item" th:classappend="${page.last} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/reports(page=${page.number+1},size=${size},search=${search})}">Next</a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
